server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: user-management
  cache:
    type: caffeine
    cache-names: [users, user]
  threads:
    virtual:
      enabled: true
  data:
    mongodb:
      uri: mongodb://localhost:27017/user-management-db
      database: user-management-db

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.abdul.usermanagement: DEBUG
    org.springframework.data.mongodb: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
